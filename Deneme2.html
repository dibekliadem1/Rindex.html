<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RIVAL REGIONS — PRO EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a; --panel: #0c0f14; --border: #1a2030;
    --gold: #c9a84c; --gold2: #e8c97a; --text: #c8bfa8;
    --red: #c0392b; --green: #1e8449; --blue: #1a6a9a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { 
    background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif;
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  }

  /* --- Gelişmiş Header --- */
  #header {
    height: 65px; background: #0a0d12; border-bottom: 2px solid var(--border);
    display: flex; align-items: center; padding: 0 15px; justify-content: space-between;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  .res-container { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
  .res-item { 
    background: #11141c; border: 1px solid var(--border); padding: 5px 10px;
    border-radius: 6px; display: flex; flex-direction: column; align-items: center;
  }
  .res-val { color: var(--gold); font-weight: 900; font-size: 14px; }
  .res-lab { font-size: 9px; opacity: 0.6; text-transform: uppercase; }

  /* --- Harita ve UI --- */
  #content { flex: 1; position: relative; }
  canvas { background: #05070a; touch-action: none; width: 100%; height: 100%; }

  #mobile-controls {
    position: absolute; bottom: 10px; left: 10px; right: 10px;
    background: rgba(12, 15, 20, 0.95); border: 1px solid var(--gold);
    border-radius: 12px; padding: 12px; backdrop-filter: blur(10px);
    display: none; transform: translateY(20px); transition: 0.3s;
  }
  #mobile-controls.active { display: block; transform: translateY(0); }

  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .btn {
    padding: 12px; border: 1px solid var(--border); background: #11141c;
    color: var(--text); font-family: 'Cinzel'; font-size: 11px; border-radius: 6px;
  }
  .btn-attack { border-color: var(--red); color: #ff4d4d; box-shadow: 0 0 10px rgba(192,57,43,0.3); }

  /* --- Tab Menü --- */
  #tabs {
    height: 60px; background: #0c0f14; border-top: 2px solid var(--border);
    display: flex; padding-bottom: env(safe-area-inset-bottom);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; font-size: 10px; color: #5a5648; font-family: 'Cinzel';
  }
  .tab-btn.active { color: var(--gold); background: rgba(201, 168, 76, 0.05); }

  /* --- Animasyonlar --- */
  .floating-text {
    position: absolute; pointer-events: none; font-weight: bold;
    font-family: 'Cinzel'; animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-50px); } }

</style>
</head>
<body>

<div id="header">
  <div style="font-family:'Cinzel'; color:var(--gold); font-size:18px; font-weight:900;">RIVAL</div>
  <div class="res-container">
    <div class="res-item"><span class="res-val" id="gold-val">200</span><span class="res-lab">Altın</span></div>
    <div class="res-item"><span class="res-val" id="army-val">20</span><span class="res-lab">Ordu</span></div>
    <div class="res-item"><span class="res-val" id="level-val">1</span><span class="res-lab">Seviye</span></div>
  </div>
</div>

<div id="content">
    <canvas id="gameCanvas"></canvas>
    
    <div id="mobile-controls">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b id="sel-reg-name" style="color:var(--gold2)">Bölge Seçildi</b>
            <span id="sel-reg-def" style="font-size:12px">Savunma: %100</span>
        </div>
        <div class="action-row">
            <button class="btn btn-attack" onclick="handleAttack()">SALDIR (50 💰)</button>
            <button class="btn" onclick="switchTab('factory')">FABRİKA KUR</button>
        </div>
    </div>
</div>

<div id="tabs">
    <div class="tab-btn active" onclick="switchTab('map')">🗺️<br>HARİTA</div>
    <div class="tab-btn" onclick="switchTab('army')">⚔️<br>ORDU</div>
    <div class="tab-btn" onclick="switchTab('factory')">🏭<br>ÜRETİM</div>
    <div class="tab-btn" onclick="switchTab('rank')">🏆<br>LİDER</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gold = 200;
    let level = 1;
    let regions = [];
    let selected = null;
    let armyPower = 20;

    // --- Başlatma ---
    function init() {
        resize();
        generateMap();
        setInterval(passiveIncome, 3000);
        animate();
        loadGame();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = canvas.offsetHeight;
    }

    function generateMap() {
        for(let i=0; i<40; i++) {
            regions.push({
                id: i,
                x: Math.random() * (canvas.width - 60) + 30,
                y: Math.random() * (canvas.height - 60) + 30,
                owner: i === 0 ? 'player' : 'enemy',
                army: Math.floor(Math.random() * 50) + 10,
                name: "Bölge " + (i + 1)
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Çizgiler ve Savaş Sisi Efekti
        regions.forEach(r => {
            const dist = Math.hypot(regions[0].x - r.x, regions[0].y - r.y);
            const opacity = r.owner === 'player' ? 1 : Math.max(0.1, 1 - dist/500);
            
            ctx.globalAlpha = opacity;
            ctx.beginPath();
            ctx.arc(r.x, r.y, 25, 0, Math.PI * 2);
            ctx.fillStyle = r.owner === 'player' ? '#1e8449' : '#c0392b';
            ctx.fill();
            
            if(selected === r) {
                ctx.strokeStyle = '#e8c97a';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            ctx.fillStyle = "white";
            ctx.font = "10px Arial";
            ctx.textAlign = "center";
            ctx.fillText(r.army, r.x, r.y + 5);
            ctx.globalAlpha = 1;
        });

        requestAnimationFrame(animate);
    }

    // --- Mekanikler ---
    function handleAttack() {
        if(!selected || selected.owner === 'player') return;
        
        const cost = 50;
        if(gold >= cost) {
            gold -= cost;
            if(armyPower * (1 + level*0.1) > selected.army) {
                selected.owner = 'player';
                selected.army = Math.floor(armyPower * 0.2);
                createFloatingText("FETİH!", selected.x, selected.y, "#2ecc71");
                level++;
                saveGame();
            } else {
                armyPower = Math.floor(armyPower * 0.8);
                createFloatingText("YENİLGİ", selected.x, selected.y, "#e74c3c");
            }
            updateUI();
        }
    }

    function passiveIncome() {
        const myCount = regions.filter(r => r.owner === 'player').length;
        gold += myCount * 5;
        updateUI();
    }

    function updateUI() {
        document.getElementById('gold-val').textContent = Math.floor(gold);
        document.getElementById('army-val').textContent = armyPower;
        document.getElementById('level-val').textContent = level;
    }

    function createFloatingText(txt, x, y, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color;
        el.innerText = txt;
        document.getElementById('content').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    // --- Kayıt Sistemi ---
    function saveGame() {
        const data = { gold, level, armyPower, regions: regions.map(r => r.owner) };
        localStorage.setItem('rival_regions_save', JSON.stringify(data));
    }

    function loadGame() {
        const saved = localStorage.getItem('rival_regions_save');
        if(saved) {
            const data = JSON.parse(saved);
            gold = data.gold;
            level = data.level;
            armyPower = data.armyPower;
            updateUI();
        }
    }

    // --- Mobil İnteraksiyon ---
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        selected = regions.find(r => Math.hypot(r.x - x, r.y - y) < 30);
        if(selected) {
            const ctrl = document.getElementById('mobile-controls');
            ctrl.classList.add('active');
            document.getElementById('sel-reg-name').innerText = selected.name;
        }
    });

    window.onload = init;
    function switchTab(t) { alert(t + " Menüsü Yakında Eklenecek!"); }
</script>
</body>
</html>
