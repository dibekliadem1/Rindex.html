<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RIVAL REGIONS — GERÇEK DÜNYA SAVAŞI</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #03050a; --panel: #0a0d14; --border: #1a2130;
    --gold: #d4af37; --gold2: #f0c850; --text: #e2e8f0; --text2: #8f9bb3;
    --red: #c0392b; --green: #27ae60; --blue: #2980b9;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

  /* UI ELEMENTS */
  #header { height: 60px; background: #080b12; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 15px; z-index: 20; }
  .resource-bar { display: flex; gap: 8px; flex: 1; justify-content: center; }
  .res-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; color: var(--gold2); }
  
  #tabs { height: 50px; display: flex; background: var(--panel); border-bottom: 1px solid var(--border); }
  .tab-btn { flex: 1; background: transparent; border: none; color: var(--text2); font-family: 'Cinzel', serif; font-size: 10px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(212,175,55,0.05); }

  #content { flex: 1; position: relative; overflow: hidden; }
  .tab-panel { position: absolute; inset: 0; display: none; flex-direction: column; }
  .tab-panel.active { display: flex; }

  #map-container { flex: 1; position: relative; background: #000; overflow: hidden; }
  canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }

  #action-bar { height: 70px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
  .btn { padding: 10px 20px; border-radius: 6px; border: 1px solid; cursor: pointer; font-family: 'Cinzel'; font-size: 12px; transition: 0.2s; background: transparent; }
  .btn:disabled { opacity: 0.2; cursor: not-allowed; }
  .btn-atk { color: var(--red); border-color: var(--red); }
  .btn-rec { color: var(--blue); border-color: var(--blue); }

  /* LISTS & RANKING */
  .list-container { flex: 1; overflow-y: auto; padding: 15px; }
  .rank-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); gap: 10px; }
  .log-entry { font-size: 12px; padding: 8px; border-left: 3px solid #333; margin-bottom: 5px; background: rgba(255,255,255,0.02); }

  /* FLOATING TEXT */
  .combat-text { position: absolute; font-family: 'Cinzel'; font-weight: 900; pointer-events: none; animation: floatUp 1.2s forwards; text-shadow: 2px 2px 0 #000; z-index: 100; transform: translateX(-50%); }
  @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -50px); } }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: #0a0d14; padding: 30px; border: 1px solid var(--gold); border-radius: 10px; text-align: center; max-width: 400px; }
</style>
</head>
<body>

<div id="intro" class="overlay">
  <div class="modal">
    <h1 style="font-family:'Cinzel'; color:var(--gold);">GERÇEK DÜNYA SAVAŞI</h1>
    <p style="margin: 15px 0; color:var(--text2);">Türkiye, Rusya, ABD, Çin ve diğer devletlerle gerçek dünya haritasında savaş. Şehirleri fethet, ordunu büyüt, dünyaya hükmet.</p>
    <button class="btn btn-rec" onclick="initGame()" style="width:100%; color:var(--gold); border-color:var(--gold);">SAVAŞI BAŞLAT</button>
  </div>
</div>

<div id="header">
  <div style="font-family:'Cinzel'; color:var(--gold); font-weight:900;">RR REAL WORLD</div>
  <div class="resource-bar">
    <div class="res-item">💰 <span id="ui-gold">0</span></div>
    <div class="res-item">⚔️ <span id="ui-power">0</span></div>
    <div class="res-item">🗺️ <span id="ui-regs">0</span></div>
  </div>
  <div id="timer" style="font-size: 12px; color: var(--gold);">00:00</div>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="showTab('map', this)">HARİTA</button>
  <button class="tab-btn" onclick="showTab('army', this)">ORDU</button>
  <button class="tab-btn" onclick="showTab('rank', this)">SIRALAMA</button>
  <button class="tab-btn" onclick="showTab('log', this)">GÜNLÜK</button>
</div>

<div id="content">
  <div id="tab-map" class="tab-panel active">
    <div id="map-container"><canvas id="map-canvas"></canvas></div>
    <div id="action-bar">
      <div id="sel-info" style="flex:1; font-size:11px;">
        <b id="sel-name" style="color:var(--gold); display:block; font-size:13px;">Bölge Seçilmedi</b>
        <span id="sel-stats">Bir şehre tıkla.</span>
      </div>
      <button id="btn-atk" class="btn btn-atk" onclick="playerAttack()" disabled>SALDIR</button>
    </div>
  </div>
  <div id="tab-army" class="tab-panel"><div class="list-container" id="army-list"></div></div>
  <div id="tab-rank" class="tab-panel"><div class="list-container" id="rank-list"></div></div>
  <div id="tab-log" class="tab-panel"><div class="list-container" id="log-list"></div></div>
</div>

<script>
// --- KONFIGÜRASYON & DÜNYA VERİLERİ ---
const COLS = 20, ROWS = 15;
const NUM_STATES = 12;  // Gerçek dünya devletleri
const PLAYER_ID = 0;

// Gerçek dünya ülkeleri
const COUNTRIES = [
  { name: "TÜRKİYE", color: "#e67e22", flag: "🇹🇷", capital: "Ankara" },
  { name: "RUSYA", color: "#c0392b", flag: "🇷🇺", capital: "Moskova" },
  { name: "ABD", color: "#2980b9", flag: "🇺🇸", capital: "Washington" },
  { name: "ÇİN", color: "#f1c40f", flag: "🇨🇳", capital: "Pekin" },
  { name: "ALMANYA", color: "#2c3e50", flag: "🇩🇪", capital: "Berlin" },
  { name: "FRANSA", color: "#3498db", flag: "🇫🇷", capital: "Paris" },
  { name: "İNGİLTERE", color: "#1abc9c", flag: "🇬🇧", capital: "Londra" },
  { name: "İRAN", color: "#16a085", flag: "🇮🇷", capital: "Tahran" },
  { name: "MISIR", color: "#d35400", flag: "🇪🇬", capital: "Kahire" },
  { name: "HİNDİSTAN", color: "#e67e22", flag: "🇮🇳", capital: "Yeni Delhi" },
  { name: "JAPONYA", color: "#e84393", flag: "🇯🇵", capital: "Tokyo" },
  { name: "BREZİLYA", color: "#27ae60", flag: "🇧🇷", capital: "Brasília" }
];

// Gerçek dünya şehirleri (20x15 = 300 bölge için yeterli örnek, 150 farklı şehir)
const REAL_CITIES = [
  "İstanbul", "Ankara", "İzmir", "Bursa", "Antalya", "Adana", "Konya", "Gaziantep", "Mersin", "Diyarbakır",
  "Van", "Erzurum", "Samsun", "Trabzon", "Kayseri", "Eskişehir", "Denizli", "Şanlıurfa", "Malatya", "Kahramanmaraş",
  "Moskova", "St. Petersburg", "Novosibirsk", "Yekaterinburg", "Kazan", "New York", "Los Angeles", "Chicago", "Houston", "Philadelphia",
  "Pekin", "Şanghay", "Guangzhou", "Shenzhen", "Hong Kong", "Berlin", "Münih", "Hamburg", "Frankfurt", "Köln",
  "Paris", "Marsilya", "Lyon", "Toulouse", "Nice", "Londra", "Birmingham", "Manchester", "Liverpool", "Edinburgh",
  "Tahran", "Meşhed", "İsfahan", "Karaj", "Şiraz", "Kahire", "İskenderiye", "Giza", "Lüksor", "Aswan",
  "Yeni Delhi", "Mumbai", "Kalküta", "Bangalore", "Haydarabad", "Tokyo", "Osaka", "Nagoya", "Sapporo", "Fukuoka",
  "São Paulo", "Rio de Janeiro", "Brasília", "Salvador", "Fortaleza"
];

let game = {
  running: false, selected: null, gold: 500, 
  units: { infantry: 12, tank: 2 },
  regions: [], states: [], logs: [], time: 0
};

const UNIT_DATA = {
  infantry: { name: "Piyade", cost: 25, power: 1.5, icon: "🛡️", desc: "Temel birlik" },
  tank: { name: "Zırhlı Tugay", cost: 120, power: 8, icon: "🚜", desc: "Ağır saldırı gücü" }
};

// --- BAŞLATMA ---
function initGame() {
  document.getElementById('intro').style.display = 'none';
  
  // Devletleri oluştur
  for(let i=0; i<NUM_STATES; i++) {
    const c = COUNTRIES[i % COUNTRIES.length];
    game.states[i] = {
      id: i,
      name: c.name,
      color: c.color,
      flag: c.flag,
      gold: i === PLAYER_ID ? 500 : 200 + Math.random() * 300,
      power: i === PLAYER_ID ? 30 : 10 + Math.random() * 20,
      isAggressive: Math.random() > 0.6
    };
  }

  // Bölgeleri (şehirleri) oluştur, her devlete başlangıçta birkaç şehir ver
  const total = COLS * ROWS;
  for(let i=0; i<total; i++) {
    let cityName = REAL_CITIES[i % REAL_CITIES.length];
    if (i >= REAL_CITIES.length) cityName += (Math.floor(i/REAL_CITIES.length)+1);
    let owner = Math.floor(Math.random() * NUM_STATES);
    game.regions[i] = { 
      id: i, 
      owner: owner, 
      army: Math.floor(Math.random()*12) + 4,
      name: cityName
    };
  }
  // Oyuncuya başlangıç şehirleri (İstanbul, Ankara, İzmir)
  let playerStartIds = [0, 1, 2]; // grid başı
  playerStartIds.forEach((id, idx) => {
    if(id < total) {
      game.regions[id].owner = PLAYER_ID;
      game.regions[id].army = 15 + idx * 3;
      game.regions[id].name = idx === 0 ? "İstanbul" : (idx === 1 ? "Ankara" : "İzmir");
    }
  });

  game.running = true;
  game.gold = 500;
  game.units = { infantry: 12, tank: 2 };
  game.time = 0;
  game.logs = [];
  
  resize();
  updateLoop();
  addLog("Gerçek dünya savaşı başladı! Türkiye'yi zafere taşı.", "green");
  addLog("Van, Erzurum, Trabzon gibi şehirler sizi bekliyor.", "blue");
}

// --- OYUN DÖNGÜSÜ (AI, EKONOMİ) ---
function updateLoop() {
  if(!game.running) return;

  // AI adımları (zaman bazlı)
  if(Math.random() < 0.08) runAIStep();
  
  // Ekonomi: sahip olunan bölge başına altın geliri
  let playerRegionCount = getStateRegions(PLAYER_ID).length;
  game.gold += playerRegionCount * 2 + 5;
  game.gold = Math.floor(game.gold);
  
  game.time++;
  updateUI();
  draw();
  requestAnimationFrame(updateLoop);
}

function runAIStep() {
  let aiId = Math.floor(Math.random() * NUM_STATES);
  if(aiId === PLAYER_ID) return;

  let myRegs = getStateRegions(aiId);
  if(myRegs.length === 0) return;

  let source = myRegs[Math.floor(Math.random() * myRegs.length)];
  let neighbors = getNeighbors(source.id);
  if(neighbors.length === 0) return;
  
  let targetId = neighbors[Math.floor(Math.random() * neighbors.length)];
  let target = game.regions[targetId];

  if(target.owner !== aiId) {
    let force = source.army * (0.7 + Math.random() * 0.6);
    let defense = target.army * 1.2;
    if(force > defense) {
      let oldOwner = target.owner;
      target.owner = aiId;
      target.army = Math.floor(force * 0.4) + 2;
      if(oldOwner === PLAYER_ID) {
        addLog(`🔥 KRİZ: ${target.name} şehri ${game.states[aiId].name} tarafından işgal edildi!`, "red");
        spawnCombatText(target.id, "İŞGAL!", "red");
      } else {
        addLog(`${game.states[aiId].name}, ${target.name} şehrini ele geçirdi.`, "blue");
      }
    } else {
      // Başarısız saldırı
      source.army = Math.max(2, source.army - 2);
    }
  } else {
    // Kendi bölgesinde asker artır
    source.army += 1;
  }
}

// --- OYUNCU AKSİYONLARI ---
function playerAttack() {
  if(game.selected === null) return;
  let target = game.regions[game.selected];
  if(target.owner === PLAYER_ID) {
    addLog("Kendi şehrine saldıramazsın!", "red");
    return;
  }
  if(!isPlayerNeighbor(game.selected)) {
    addLog("Bu şehre saldırmak için önce komşu bir şehre sahip olmalısın.", "red");
    return;
  }

  let cost = 35;
  if(game.gold < cost) {
    addLog("Yeterli altın yok! (35 altın gerekli)", "red");
    return;
  }

  game.gold -= cost;
  let atkPower = calcTotalPower();
  let defPower = target.army * (0.9 + Math.random() * 0.5);
  
  if(atkPower > defPower) {
    // Zafer
    target.owner = PLAYER_ID;
    target.army = Math.floor(atkPower * 0.2) + 3;
    addLog(`🏆 ZAFER: ${target.name} şehri ele geçirildi!`, "green");
    spawnCombatText(target.id, "FETİH!", "#2ecc71");
    // Ordu kaybı
    game.units.infantry = Math.max(1, Math.floor(game.units.infantry * 0.85));
    game.units.tank = Math.max(0, Math.floor(game.units.tank * 0.9));
  } else {
    // Yenilgi
    addLog(`💀 BOZGUN: ${target.name} saldırısı püskürtüldü!`, "red");
    spawnCombatText(target.id, "YENİLGİ", "red");
    game.units.infantry = Math.max(1, Math.floor(game.units.infantry * 0.6));
    game.units.tank = Math.max(0, Math.floor(game.units.tank * 0.7));
  }
  updateUI();
  renderArmy();
}

function buyUnit(type) {
  let u = UNIT_DATA[type];
  if(game.gold >= u.cost) {
    game.gold -= u.cost;
    game.units[type]++;
    addLog(`${u.name} birliği orduna katıldı.`, "blue");
    renderArmy();
    updateUI();
  } else {
    addLog("Yetersiz altın!", "red");
  }
}

// --- GÖRSELLER & HARİTA ---
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
let cellW, cellH;

function draw() {
  if(!game.running || canvas.width === 0) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  game.regions.forEach((r, i) => {
    let x = (i % COLS) * cellW;
    let y = Math.floor(i / COLS) * cellH;
    let w = cellW - 1;
    let h = cellH - 1;
    
    ctx.fillStyle = game.states[r.owner].color;
    ctx.fillRect(x, y, w, h);
    
    // Seçili vurgusu
    if(game.selected === i) {
      ctx.strokeStyle = "#f1c40f";
      ctx.lineWidth = 3;
      ctx.strokeRect(x+2, y+2, w-4, h-4);
    }
    
    // Şehir adı ve asker sayısı (ölçeğe göre)
    if(w > 18 && h > 12) {
      ctx.font = `bold ${Math.min(9, w/6)}px Inter`;
      ctx.fillStyle = "white";
      ctx.shadowBlur = 2;
      ctx.fillText(r.name.substring(0, 8), x+4, y+12);
      ctx.font = `8px monospace`;
      ctx.fillStyle = "#ddd";
      ctx.fillText("⚔"+r.army, x+4, y+22);
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = "white";
      ctx.font = "7px monospace";
      ctx.fillText(r.army, x+4, y+12);
    }
    
    // Bayrak sembolü (küçük)
    let flag = game.states[r.owner].flag;
    ctx.font = "12px sans-serif";
    ctx.fillStyle = "white";
    ctx.fillText(flag, x+w-16, y+12);
  });
}

function resize() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
  cellW = canvas.width / COLS;
  cellH = canvas.height / ROWS;
  if(game.running) draw();
}

canvas.addEventListener('click', e => {
  if(!game.running) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.floor(x / cellW);
  const row = Math.floor(y / cellH);
  const idx = row * COLS + col;
  if(idx >= 0 && idx < game.regions.length) {
    game.selected = idx;
    let reg = game.regions[idx];
    let owner = game.states[reg.owner];
    document.getElementById('sel-name').innerHTML = `${owner.flag} ${reg.name} (${owner.name})`;
    document.getElementById('sel-stats').innerHTML = `Ordu: ${reg.army} | Gelir: ${reg.army * 2}💰/tur`;
    let isOwn = (reg.owner === PLAYER_ID);
    let canAttack = (!isOwn && isPlayerNeighbor(idx));
    document.getElementById('btn-atk').disabled = !canAttack;
  }
});

// --- YARDIMCILAR ---
function getNeighbors(id) {
  let r = Math.floor(id/COLS), c = id%COLS, n = [];
  if(r>0) n.push(id-COLS);
  if(r<ROWS-1) n.push(id+COLS);
  if(c>0) n.push(id-1);
  if(c<COLS-1) n.push(id+1);
  return n;
}
function isPlayerNeighbor(id) {
  return getNeighbors(id).some(n => game.regions[n]?.owner === PLAYER_ID);
}
function getStateRegions(sid) {
  return game.regions.filter(r => r.owner === sid);
}
function calcTotalPower() {
  return (game.units.infantry * UNIT_DATA.infantry.power) + (game.units.tank * UNIT_DATA.tank.power);
}
function addLog(msg, type) {
  let color = type === "green" ? "#2ecc71" : (type === "red" ? "#e74c3c" : "#3498db");
  game.logs.unshift(`<div class="log-entry" style="border-color:${color}">${msg}</div>`);
  document.getElementById('log-list').innerHTML = game.logs.slice(0, 50).join('');
}
function spawnCombatText(rid, txt, col) {
  const rect = canvas.getBoundingClientRect();
  if(!cellW) return;
  const x = ((rid % COLS) * cellW + cellW/2) * (rect.width/canvas.width);
  const y = (Math.floor(rid/COLS) * cellH + cellH/2) * (rect.height/canvas.height);
  const el = document.createElement('div');
  el.className = 'combat-text';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = col;
  el.textContent = txt;
  document.getElementById('map-container').appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// --- UI GÜNCELLEMELERİ ---
function updateUI() {
  document.getElementById('ui-gold').textContent = Math.floor(game.gold);
  document.getElementById('ui-power').textContent = calcTotalPower().toFixed(1);
  document.getElementById('ui-regs').textContent = getStateRegions(PLAYER_ID).length;
  let m = Math.floor(game.time / 600);
  let s = Math.floor((game.time % 600) / 10);
  document.getElementById('timer').textContent = `${m}:${s < 10 ? '0'+s : s}`;
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if(tab === 'army') renderArmy();
  if(tab === 'rank') renderRank();
}

function renderArmy() {
  let container = document.getElementById('army-list');
  container.innerHTML = `<h3>⚔ ORDU YÖNETİMİ (Altın: ${Math.floor(game.gold)})</h3><br>`;
  for(let id in UNIT_DATA) {
    let u = UNIT_DATA[id];
    container.innerHTML += `
      <div class="rank-item" style="background:rgba(255,255,255,0.02); margin-bottom:10px; border-radius:8px;">
        <div style="font-size:28px;">${u.icon}</div>
        <div style="flex:1">
          <b>${u.name}</b> <span style="color:var(--text2);">${u.desc}</span><br>
          <span style="font-size:12px;">Güç: ${u.power} | Adet: ${game.units[id]}</span>
        </div>
        <button class="btn btn-rec" onclick="buyUnit('${id}')">${u.cost}💰 AL</button>
      </div>`;
  }
}

function renderRank() {
  let container = document.getElementById('rank-list');
  let sorted = [...game.states].sort((a,b) => getStateRegions(b.id).length - getStateRegions(a.id).length);
  container.innerHTML = "<h3>🏆 DÜNYA SIRALAMASI</h3><br>";
  sorted.slice(0, NUM_STATES).forEach((s, i) => {
    let regionCount = getStateRegions(s.id).length;
    let isPlayer = (s.id === PLAYER_ID);
    container.innerHTML += `
      <div class="rank-item" style="${isPlayer ? 'background:rgba(212,175,55,0.1);' : ''}">
        <b>#${i+1}</b>
        <div style="width:12px; height:12px; background:${s.color}; border-radius:50%;"></div>
        <div style="flex:1"><span style="font-size:16px;">${s.flag}</span> ${s.name}</div>
        <div style="color:var(--gold2)">${regionCount} şehir</div>
      </div>`;
  });
}

// --- OLAY DİNLEYİCİLER ---
window.addEventListener('resize', () => { resize(); if(game.running) draw(); });
</script>
</body>
</html>
