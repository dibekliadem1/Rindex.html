<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RIVAL REGIONS — ULTIMATE STRATEGY</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* MEVCUT CSS AYARLARI */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #03050a; --panel: #0a0d14; --panel2: #0f131b; --border: #1a2130;
    --gold: #d4af37; --gold2: #f0c850; --text: #e2e8f0; --text2: #8f9bb3;
    --red: #c0392b; --red2: #e74c3c; --green: #27ae60; --green2: #2ecc71;
    --blue: #2980b9; --blue2: #3498db; --purple: #8e44ad; --orange: #e67e22;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

  /* HEADER & TABS */
  #header { height: 56px; background: linear-gradient(180deg, #0d1119 0%, #080b12 100%); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 20px; flex-shrink: 0; z-index: 20; }
  .logo { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 900; color: var(--gold); letter-spacing: 2px; white-space: nowrap; }
  .resource-bar { display: flex; gap: 10px; flex: 1; justify-content: center; overflow-x: auto; scrollbar-width: none; }
  .res-item { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 4px 12px; border-radius: 6px; font-size: 12px; }
  .res-val { color: var(--gold2); font-weight: 700; font-size: 14px; }
  .res-label { color: var(--text2); font-size: 9px; text-transform: uppercase; }
  #speed-panel { display: flex; gap: 5px; align-items: center; }
  .spd-btn { font-family: 'Cinzel', serif; font-size: 10px; padding: 4px 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; border-radius: 4px; }
  .spd-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }
  #timer { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; background: rgba(212,175,55,0.05); }

  #tabs { height: 52px; display: flex; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab-btn { flex: 1; background: transparent; border: none; color: var(--text2); font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border-bottom: 2px solid transparent; transition: 0.2s; }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: linear-gradient(180deg, transparent, rgba(212,175,55,0.05)); }

  /* CONTENT PANELS */
  #content { flex: 1; position: relative; overflow: hidden; }
  .tab-panel { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
  .tab-panel.active { display: flex; }
  #map-container { flex: 1; position: relative; overflow: hidden; background: radial-gradient(ellipse at center, #0a0f18 0%, #03050a 100%); }
  canvas { display: block; cursor: crosshair; width: 100%; height: 100%; }

  /* UI COMPONENTS */
  #info-bar { background: var(--panel2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px 15px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  #action-bar { background: var(--panel); border-top: 1px solid var(--border); padding: 10px 15px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .btn { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; padding: 10px 18px; border: 1px solid; background: transparent; cursor: pointer; border-radius: 6px; transition: 0.2s; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-attack { color: var(--red2); border-color: var(--red); }
  .btn-recruit { color: var(--blue2); border-color: var(--blue); }
  .btn-factory { color: var(--gold); border-color: var(--gold); }

  /* FLOATING TEXT ANIMATION */
  .combat-text {
    position: absolute; font-family: 'Cinzel', serif; font-weight: bold; font-size: 16px;
    pointer-events: none; animation: floatUp 1.2s forwards; text-shadow: 0 2px 4px black; z-index: 100;
  }
  @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -60px); } }

  /* CARDS & LISTS */
  #army-scroll, #factory-scroll, #rank-scroll, #log-scroll { flex: 1; overflow-y: auto; padding: 12px; }
  .unit-card, .factory-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; padding: 12px; display: flex; gap: 12px; align-items: center; }
  .unit-info, .factory-info { flex: 1; }
  .recruit-btn, .build-factory-btn { margin-top: 6px; padding: 6px 12px; font-size: 10px; font-family: 'Cinzel', serif; border: 1px solid var(--blue); color: var(--blue2); background: transparent; cursor: pointer; border-radius: 4px; width: 100%; }

  /* OVERLAYS */
  .overlay { position: fixed; inset: 0; background: rgba(3,5,10,0.96); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--gold); border-radius: 12px; max-width: 420px; width: 90%; padding: 28px; text-align: center; }
</style>
</head>
<body>

<div class="overlay active" id="intro-overlay">
  <div class="modal">
    <h2>⚔ RIVAL REGIONS</h2>
    <p style="margin: 10px 0; color: var(--text2);">Gerçek zamanlı küresel stratejiye hoş geldin.</p>
    <button onclick="startGame()">SAVAŞA BAŞLA</button>
  </div>
</div>

<div id="header">
  <div class="logo">⚔ RIVAL REGIONS</div>
  <div class="resource-bar">
    <div class="res-item">💰<span class="res-val" id="r-gold">200</span></div>
    <div class="res-item">⚔️<span class="res-val" id="r-army">20</span></div>
    <div class="res-item">🗺️<span class="res-val" id="r-reg">1</span></div>
    <div class="res-item">📊<span class="res-val" id="r-rank">#?</span></div>
  </div>
  <div id="speed-panel">
    <button class="spd-btn active" onclick="setSpeed(1)" id="sp1">×1</button>
    <button class="spd-btn" onclick="setSpeed(3)" id="sp3">×3</button>
    <button class="spd-btn" onclick="setSpeed(10)" id="sp10">×10</button>
    <div id="timer">00:00</div>
  </div>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('map', this)"><span class="tab-icon">🗺️</span><span>HARİTA</span></button>
  <button class="tab-btn" onclick="switchTab('army', this)"><span class="tab-icon">⚔️</span><span>ORDU</span></button>
  <button class="tab-btn" onclick="switchTab('factory', this)"><span class="tab-icon">🏭</span><span>FABRİKA</span></button>
  <button class="tab-btn" onclick="switchTab('rank', this)"><span class="tab-icon">🏆</span><span>SIRALAMA</span></button>
  <button class="tab-btn" onclick="switchTab('log', this)"><span class="tab-icon">📜</span><span>OLAYLAR</span></button>
</div>

<div id="content">
  <div class="tab-panel active" id="panel-map">
    <div id="map-container"><canvas id="map-canvas"></canvas></div>
    <div id="info-bar">
      <div class="region-name" id="sel-name">Bölge Seçin</div>
      <div id="sel-stats" style="display:flex; gap:15px; font-size:12px;"></div>
      <span class="region-badge badge-neutral" id="sel-badge">SEÇİLMEDİ</span>
    </div>
    <div id="action-bar">
      <button class="btn btn-attack" id="btn-attack" onclick="attackAction()" disabled>⚔ SALDIR</button>
      <button class="btn btn-recruit" id="btn-recruit" onclick="switchTab('army')" disabled>🛡 ASKER AL</button>
      <button class="btn btn-factory" id="btn-factory" onclick="switchTab('factory')" disabled>🏭 FABRİKA</button>
      <div id="hint" style="flex:1; font-size:11px; color:var(--text2); text-align:center;">Haritadan bir bölge seçin</div>
      <div class="cd-group" style="display:flex; gap:5px;">
        <div class="cd-bar" style="width:30px; height:4px; background:rgba(255,255,255,0.1);"><div id="cd-attack" style="height:100%; background:var(--red); width:0%;"></div></div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="panel-army"><div id="army-scroll"></div></div>
  <div class="tab-panel" id="panel-factory"><div id="factory-scroll"></div></div>
  <div class="tab-panel" id="panel-rank"><div id="rank-scroll"></div></div>
  <div class="tab-panel" id="panel-log"><div id="log-scroll"></div></div>
</div>

<script>
  // ========== CONFIG & STATE ==========
  const COLS = 30, ROWS = 20, TOTAL = COLS * ROWS, NUM_STATES = 200;
  const PLAYER_ID = 0, AI_INTERVAL = 2500, INCOME_TICK = 5000;
  
  const CD = { attack: 6000, infantry: 8000, archer: 10000, cavalry: 12000, siege: 15000 };
  const UNITS = {
    infantry: { id:'infantry', name:'Piyade', icon:'🛡️', cost:25, power:1, attack:1 },
    archer: { id:'archer', name:'Okçu', icon:'🏹', cost:45, power:1.8, attack:2.5 },
    cavalry: { id:'cavalry', name:'Süvari', icon:'🐎', cost:80, power:3.5, attack:4 },
    siege: { id:'siege', name:'Mancınık', icon:'💥', cost:150, power:6, attack:8 }
  };

  let game = {
    speed: 1, time: 0, running: false, selected: null,
    player: { gold: 200, units: { infantry:20, archer:0, cavalry:0, siege:0 }, cooldowns: {} },
    regions: [], states: [], nextIncome: INCOME_TICK
  };

  // ========== YENİ FONKSİYONLAR (GÖRSEL EFEKT) ==========
  function spawnCombatText(regionId, text, color) {
    const rect = canvas.getBoundingClientRect();
    const col = regionId % COLS;
    const row = Math.floor(regionId / COLS);
    const x = (col * cellW + cellW / 2) * (rect.width / canvas.width);
    const y = (row * cellH + cellH / 2) * (rect.height / canvas.height);

    const el = document.createElement('div');
    el.className = 'combat-text';
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    el.style.color = color;
    el.textContent = text;
    
    document.getElementById('map-container').appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }

  // ========== ACTIONS ==========
  function attackAction() {
    if(game.selected === null) return;
    const reg = game.regions[game.selected];
    const now = performance.now();
    if(now < (game.player.cooldowns.attack || 0)) return;

    const atkPow = calcPower();
    const defPow = reg.army * (calcDefense(reg)/100);
    const won = Math.random() < atkPow / (atkPow + defPow);

    if(won) {
      const losses = Math.floor(Math.random()*3)+1;
      reduceUnits(losses);
      reg.owner = PLAYER_ID;
      reg.army = Math.max(1, Math.floor(atkPow * 0.1));
      spawnCombatText(game.selected, "FETİH! ⚔️", "#2ecc71");
      addLog(`Bölge #${game.selected} fethedildi!`, 'win');
    } else {
      const losses = Math.floor(Math.random()*5)+2;
      reduceUnits(losses);
      spawnCombatText(game.selected, `KAYIP -${losses}`, "#e74c3c");
      addLog(`Saldırı başarısız!`, 'war');
    }
    game.player.cooldowns.attack = now + CD.attack;
    updateUI(); drawMap();
  }

  function recruitUnit(type) {
    const unit = UNITS[type];
    const now = performance.now();
    if(game.player.gold < unit.cost || now < (game.player.cooldowns[type]||0)) return;

    game.player.gold -= unit.cost;
    const amount = type === 'infantry' ? 5 : 2;
    game.player.units[type] += amount;
    game.player.cooldowns[type] = now + CD[type];
    
    // Görsel geri bildirim
    const myRegs = getStateRegions(PLAYER_ID);
    if(myRegs.length > 0) spawnCombatText(myRegs[0].id, `+${amount} ${unit.name}`, "#3498db");
    
    addLog(`${unit.name} birliği eğitildi.`, 'gold');
    updateUI();
    if(document.getElementById('panel-army').classList.contains('active')) renderArmyPanel();
  }

  function switchTab(tab, element) {
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    
    if(element) element.classList.add('active');
    else {
        const btn = document.querySelector(`.tab-btn[onclick*="${tab}"]`);
        if(btn) btn.classList.add('active');
    }

    if(tab==='army') renderArmyPanel();
    if(tab==='factory') renderFactoryPanel();
    if(tab==='rank') renderRankPanel();
  }

  // ========== CORE LOGIC (Önceki koddan devam) ==========
  function calcPower() {
    let p = 0;
    for(let t in game.player.units) p += game.player.units[t] * UNITS[t].power;
    return Math.floor(p);
  }

  function reduceUnits(amount) {
    for(let t in game.player.units) {
      game.player.units[t] = Math.max(0, game.player.units[t] - Math.floor(amount * 0.2));
    }
  }

  function calcDefense(reg) { return 100 + (reg.barracks * 40); }
  function getStateRegions(sid) { return game.regions.filter(r => r.owner === sid); }
  function isPlayerNeighbor(id) {
    const r = Math.floor(id/COLS), c = id%COLS, nb = [];
    if(r>0) nb.push(id-COLS); if(r<ROWS-1) nb.push(id+COLS);
    if(c>0) nb.push(id-1); if(c<COLS-1) nb.push(id+1);
    return nb.some(n => game.regions[n]?.owner === PLAYER_ID);
  }

  // Canvas & Map
  const canvas = document.getElementById('map-canvas');
  const ctx = canvas.getContext('2d');
  let cellW, cellH;

  function drawMap() {
    ctx.fillStyle = '#03050a'; ctx.fillRect(0,0,canvas.width,canvas.height);
    game.regions.forEach((reg, i) => {
      const col = i % COLS, row = Math.floor(i/COLS);
      const x = col*cellW, y = row*cellH;
      ctx.fillStyle = reg.owner === PLAYER_ID ? '#1a3d5c' : (reg.owner<0 ? '#1a1a1a' : `hsl(${game.states[reg.owner].hue},50%,25%)`);
      ctx.fillRect(x,y,cellW-1,cellH-1);
      if(game.selected === i) { ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 2; ctx.strokeRect(x,y,cellW-1,cellH-1); }
    });
  }

  // UI & Init
  function updateUI() {
    document.getElementById('r-gold').textContent = Math.floor(game.player.gold);
    document.getElementById('r-army').textContent = calcPower();
    document.getElementById('r-reg').textContent = getStateRegions(PLAYER_ID).length;
    
    if(game.selected !== null) {
      const reg = game.regions[game.selected];
      document.getElementById('sel-name').textContent = reg.owner === PLAYER_ID ? "Bölgeniz" : (reg.owner < 0 ? "Bağımsız" : game.states[reg.owner].name);
      document.getElementById('btn-attack').disabled = reg.owner === PLAYER_ID || !isPlayerNeighbor(game.selected);
      document.getElementById('btn-recruit').disabled = reg.owner !== PLAYER_ID;
    }
    
    const atkRem = Math.max(0, (game.player.cooldowns.attack||0) - performance.now());
    document.getElementById('cd-attack').style.width = (100 - (atkRem / CD.attack * 100)) + '%';
  }

  function addLog(msg, type) {
    const log = document.getElementById('log-scroll');
    const entry = document.createElement('div');
    entry.style.padding = '5px'; entry.style.borderLeft = '3px solid ' + (type==='win'?'green':'red');
    entry.innerHTML = msg;
    log.prepend(entry);
  }

  function startGame() {
    document.getElementById('intro-overlay').classList.remove('active');
    // Init regions
    for(let i=0; i<TOTAL; i++) {
      game.regions[i] = { id:i, owner:-1, army: 5, barracks: 0 };
    }
    // Init states
    for(let i=0; i<NUM_STATES; i++) {
        game.states[i] = { id:i, name: 'Devlet '+i, hue: (i*137)%360, army: 10 };
        let pos = Math.floor(Math.random()*TOTAL);
        game.regions[pos].owner = i;
    }
    game.regions[Math.floor(TOTAL/2)].owner = PLAYER_ID;
    game.running = true;
    resizeCanvas();
    setInterval(() => { if(game.running) { game.time += 100 * game.speed; updateUI(); } }, 100);
    drawMap();
  }

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    cellW = canvas.width / COLS; cellH = canvas.height / ROWS;
    drawMap();
  }

  window.addEventListener('resize', resizeCanvas);
  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const col = Math.floor(x / (rect.width/COLS)), row = Math.floor(y / (rect.height/ROWS));
    game.selected = row * COLS + col;
    drawMap(); updateUI();
  });

  function setSpeed(s) {
    game.speed = s;
    document.querySelectorAll('.spd-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sp'+s).classList.add('active');
  }

  // Boş fonksiyonlar (Hata vermemesi için)
  function renderArmyPanel() {
    const container = document.getElementById('army-scroll');
    container.innerHTML = '<h3>Birlik Alımı</h3>';
    for(let t in UNITS) {
        const u = UNITS[t];
        container.innerHTML += `<div class="unit-card">
            <b>${u.icon} ${u.name}</b> (Güç: ${u.power}) 
            <button class="recruit-btn" onclick="recruitUnit('${t}')">${u.cost}💰 Satın Al</button>
        </div>`;
    }
  }
  function renderFactoryPanel() { document.getElementById('factory-scroll').innerHTML = 'Fabrika sistemi yakında...'; }
  function renderRankPanel() { document.getElementById('rank-scroll').innerHTML = 'Sıralama hesaplanıyor...'; }

</script>
</body>
</html>
